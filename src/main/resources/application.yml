spring:
    config:
        import: optional:file:.env[.properties]
    mongodb:
        uri: ${MONGODB_URI}
        database: journalDb
    data:
        mongodb:
            auto-index-creation: true
    mail:
        host: smtp.gmail.com
        port: 587
        username: ${EMAIL_USERNAME}
        password: ${EMAIL_PASSWORD}
        properties:
            mail:
                smtp:
                    auth: true
                    starttls:
                        enable: true

weather:
    api:
        key: ${WEATHER_API_KEY}